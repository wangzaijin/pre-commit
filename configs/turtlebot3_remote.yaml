robot:
  name: turtlebot3_waffle
  description: "TurtleBot3 Waffle — remote mode (gRPC)"

connection:
  mode: remote
  remote:
    host: "localhost"   # Change to robot IP for cross-machine operation
    grpc_port: 50051
    ws_port: 8765

hardware:
  arms: []
  grippers: []

  base:
    type: differential
    cmd_vel_topic: /cmd_vel
    odom_topic: /odom
    max_linear_vel: 0.26
    max_angular_vel: 1.82

  sensors:
    cameras:
      - name: main_camera
        topic: /camera/image_raw
        info_topic: /camera/camera_info
        encoding: rgb8
        resolution: [1920, 1080]

    lidar:
      - name: base_scan
        topic: /scan
        type: 2d

    imu:
      - name: base_imu
        topic: /imu

dashboard:
  enabled: true
  port: 3000
  ws_port: 3000

safety:
  velocity_limit_check: true
  watchdog_timeout_ms: 500

logging:
  level: INFO
