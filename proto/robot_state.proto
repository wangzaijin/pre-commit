syntax = "proto3";
package tongrobot;

message JointStateMsg {
  repeated double positions  = 1;
  repeated double velocities = 2;
  repeated double efforts    = 3;
  double          timestamp  = 4;
}

message BaseStateMsg {
  // 3 elements: x, y, theta (m, m, rad)
  repeated double position = 1;
  // 3 elements: vx, vy, omega (m/s, m/s, rad/s)
  repeated double velocity = 2;
  double          timestamp = 3;
}

message GripperStateMsg {
  double position  = 1;
  bool   is_open   = 2;
  double timestamp = 3;
}

message RobotStateMsg {
  map<string, JointStateMsg>   arms     = 1;
  BaseStateMsg                 base     = 2;
  map<string, GripperStateMsg> grippers = 3;
  double                       timestamp = 4;
  bool                         has_base  = 5;
}
